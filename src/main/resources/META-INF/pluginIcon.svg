<!--
  Plugin icon — shown in Settings → Plugins, and on the JetBrains
  Marketplace listing. Mirrors the nexus brand mark from the Vue
  NexusCloud component: an "N" formed by four corner nodes joined
  by left vertical / diagonal / right vertical strokes, with a
  bright accent node at the diagonal's midpoint (the "nexus" point).

  Light-theme variant: deep emerald structure (#064e3b) + bright
  emerald accent (#10b981). The dark-theme counterpart lives in
  pluginIcon_dark.svg.

  IntelliJ recommends 40x40; corner nodes positioned to leave a
  visible margin so the icon doesn't crowd the panel chrome.
-->
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Strokes first, nodes overlay them — keeps caps clean. -->
  <path d="M8 8 L8 32 M8 32 L32 8 M32 8 L32 32"
        stroke="#064e3b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Four corner "structure" nodes. -->
  <circle cx="8"  cy="8"  r="4" fill="#064e3b" />
  <circle cx="8"  cy="32" r="4" fill="#064e3b" />
  <circle cx="32" cy="8"  r="4" fill="#064e3b" />
  <circle cx="32" cy="32" r="4" fill="#064e3b" />
  <!-- Center accent node — the brand's "nexus" point. -->
  <circle cx="20" cy="20" r="4.5" fill="#10b981" />
</svg>