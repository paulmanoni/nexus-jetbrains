<!--
  Dark-theme plugin icon. Same geometry as pluginIcon.svg with the
  palette flipped for visibility on dark IDE backgrounds:
  structure in soft white (#e5e7eb) so it doesn't glare, accent
  in bright emerald (#34d399) so the "nexus" point still pops.
-->
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 8 L8 32 M8 32 L32 8 M32 8 L32 32"
        stroke="#e5e7eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="8"  cy="8"  r="4" fill="#e5e7eb" />
  <circle cx="8"  cy="32" r="4" fill="#e5e7eb" />
  <circle cx="32" cy="8"  r="4" fill="#e5e7eb" />
  <circle cx="32" cy="32" r="4" fill="#e5e7eb" />
  <circle cx="20" cy="20" r="4.5" fill="#34d399" />
</svg>